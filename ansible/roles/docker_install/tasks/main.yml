- name: Instalar dependencias de Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
    state: present
    update_cache: yes

- name: Agregar la clave GPG oficial de Docker
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Agregar el repositorio de Docker
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu bionic stable
    state: present

- name: Instalar Docker CE
  apt:
    name: docker-ce
    state: present
    update_cache: yes

- name: Instalar Git
  apt:
    name: git
    state: present

- name: Descargar Docker Compose
  get_url:
    url: https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64
    dest: /usr/local/bin/docker-compose
    mode: '0755'

- name: Verificar instalación de Docker Compose
  command: docker-compose --version
  register: compose_version_output

- name: Mostrar versión de Docker Compose
  debug:
    var: compose_version_output.stdout

- name: Clonar el repositorio de la aplicación
  git:
    repo: https://github.com/BrayanOrteg/microservice-app-example.git
    dest: /opt/microservice-app-example
    version: ops
    force: yes

- name: Cambiar a la rama feat/external_configuration_store y pullear
  ansible.builtin.shell: git checkout feat/external_configuration_store && git pull # Use shell module for '&&'
  args:
    chdir: /opt/microservice-app-example

# NEW TASK: Create .env file
- name: Crear archivo .env con la connection string
  ansible.builtin.copy:
    content: "APPCONFIG_CONNECTION_STRING={{ appconfig_connection_string }}"
    dest: /opt/microservice-app-example/.env
    owner: azureuser # Adjust if your user is different
    group: azureuser # Adjust if your group is different
    mode: '0644'
  when: appconfig_connection_string is defined and appconfig_connection_string # Ensure variable is passed and not empty

- name: Levantar contenedores con Docker Compose
  command: docker-compose up --build # Corrected command (hyphen)
  args:
    chdir: /opt/microservice-app-example
  # The environment block below is now somewhat redundant if .env is created,
  # but it ensures the variable is set even if the .env file task fails or is skipped.
  environment:
    APPCONFIG_CONNECTION_STRING: "{{ appconfig_connection_string }}" # Use Ansible variable