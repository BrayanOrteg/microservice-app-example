services:

  redis:
    image: redis:7.0
    networks:
      - app-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  zipkin:
    image: openzipkin/zipkin
    networks:
      - app-network
    ports:
      - "9411:9411"

  auth-api:
    build:
      context: ./auth-api
      dockerfile: Dockerfile
    networks:
      - app-network
    ports:
      - "8000:8000"
    environment:
      - APP_CONFIG_CONNECTION_STRING=${APPCONFIG_CONNECTION_STRING}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - app-network
    ports:
      - "8080:8080"
    environment:
      - APP_CONFIG_CONNECTION_STRING=${APPCONFIG_CONNECTION_STRING}

  log-message-processor:
    build:
      context: ./log-message-processor
      dockerfile: Dockerfile
    networks:
      - app-network
    environment:
      - APP_CONFIG_CONNECTION_STRING=${APPCONFIG_CONNECTION_STRING}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CHANNEL=log_channel
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - DATABASE_URL=postgresql://icesi-viajes_owner:ji6kwCcDPs5o@ep-delicate-scene-a43o2df1-pooler.us-east-1.aws.neon.tech/todo?sslmode=require

  todos-api:
    build:
      context: ./todos-api
      dockerfile: Dockerfile
    networks:
      - app-network
    ports:
      - "8082:8082"
    environment:
      - APP_CONFIG_CONNECTION_STRING=${APPCONFIG_CONNECTION_STRING}
      - JWT_SECRET=PRFT
      - TODO_API_PORT=8082
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CHANNEL=log_channel
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - DATABASE_URL=postgresql://icesi-viajes_owner:ji6kwCcDPs5o@ep-delicate-scene-a43o2df1-pooler.us-east-1.aws.neon.tech/todo?sslmode=require

  users-api:
    build:
      context: ./users-api
      dockerfile: Dockerfile
    networks:
      - app-network
    ports:
      - "8083:8083"
    environment:
      - APP_CONFIG_CONNECTION_STRING=${APPCONFIG_CONNECTION_STRING}

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
